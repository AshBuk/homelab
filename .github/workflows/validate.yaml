# Validate infrastructure code on every push/PR:
#   - kubeconform: every Kubernetes manifest against its schema
#   - ansible-lint: the host-provisioning playbook (production profile)
# Catches YAML typos and invalid fields before Flux or Ansible ever see them.
name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz kubeconform

      - name: Validate manifests
        # Second schema-location teaches kubeconform the CRDs (Flux, CNPG)
        # from the community CRDs-catalog; -ignore-missing-schemas skips
        # kinds no schema exists for instead of failing.
        run: |
          ./kubeconform -strict -summary \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            apps infrastructure clusters

  ansible-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    steps:
      - uses: actions/checkout@v4

      # Explicit steps instead of the official action: its isolated venv
      # doesn't see collections that ansible-galaxy considers "already
      # installed" system-wide on the runner. --include-deps exposes
      # ansible-galaxy from the same venv as the linter; --force installs
      # collections to ~/.ansible where that venv actually looks.
      - name: Install ansible-lint
        run: pipx install --include-deps ansible-lint

      - name: Install collection dependencies
        run: ansible-galaxy collection install -r requirements.yaml --force

      - name: Run ansible-lint
        run: ansible-lint
