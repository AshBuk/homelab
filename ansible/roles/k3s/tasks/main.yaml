---
- name: Download k3s installer
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /usr/local/src/k3s-install.sh
    mode: "0755"

- name: Install k3s (single-node server)
  ansible.builtin.command:
    cmd: /usr/local/src/k3s-install.sh
  args:
    creates: /usr/local/bin/k3s # skip if already installed
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: >-
      server
      {% for san in k3s_tls_san %}--tls-san {{ san }} {% endfor %}

- name: Wait for node Ready
  ansible.builtin.command:
    cmd: k3s kubectl wait --for=condition=Ready node --all --timeout=300s
  changed_when: false
