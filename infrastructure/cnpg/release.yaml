apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  # Release name + namespace must match the adoption annotations on the
  # pre-existing CRDs (meta.helm.sh/release-name=cnpg, release-namespace
  # =cnpg-system) — that's how Helm accepted ownership of them.
  name: cnpg
  namespace: cnpg-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cloudnative-pg
      # Chart 0.29.0 ships operator (appVersion) 1.30.0 — the exact
      # version that was installed manually. Bump this line to upgrade.
      version: "0.29.0"
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: flux-system
  values:
    crds:
      # Helm manages the CRDs (adopted from the manual install). They
      # carry helm.sh/resource-policy: keep — uninstalling the release
      # leaves them (and every database) in place.
      create: true
