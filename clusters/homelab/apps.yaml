apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  # Drift check only: new commits are applied immediately regardless of
  # this. Hourly is enough for a single-operator cluster.
  interval: 1h
  # Apps consume what infrastructure provides (dev-activity reads the
  # postgres-app Secret created by CloudNativePG), so apply infra first.
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps
  # Delete cluster resources when their files are removed from Git.
  prune: true
